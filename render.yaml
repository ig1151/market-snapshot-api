services:
  - type: web
    name: market-snapshot-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npx prisma db push && npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: RATE_LIMIT_RPM
        value: 60
      - key: MARKET_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false

databases:
  - name: market-snapshot-db
    plan: free
    databaseName: market_snapshot
    user: market_snapshot_user
